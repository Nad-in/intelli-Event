
<div class="login">
  <h2>Connexion</h2>

  <div class="bloc">
    <label>Email</label>
    <input type="email" [(ngModel)]="email" placeholder="Email">
  </div>

  <div class="bloc">
    <label>Mot de passe</label>
    <input type="password" [(ngModel)]="password" placeholder="Mot de passe">
  </div>

  <button class="btn" (click)="onLogin()">SE CONNECTER</button>

  <p class="txt">
    Vous n'avez pas de compte ? <a routerLink="/registre">S'inscrire</a>
  </p>
</div>
