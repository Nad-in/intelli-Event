<div *ngIf="event">
  <h2>{{ event.titre }}</h2>

  <div>
    <img [src]="event.image">
  </div>
  <p><b>Description :</b> {{ event.descriptions }}</p>
  <p><b>Date:</b> {{ event.date }}</p>
  <p><b>Lieu:</b> {{ event.lieu }}</p>
</div>
